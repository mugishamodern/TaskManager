<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task..." class="task-input">
            <button onclick="addTask()" class="btn btn-add">+ Add Task</button>
        </div>

        <div class="stats">
            <span class="stat">Total: <strong id="totalTasks">0</strong></span>
            <span class="stat">Completed: <strong id="completedTasks">0</strong></span>
            <span class="stat">Pending: <strong id="pendingTasks">0</strong></span>
        </div>

        <div class="filter-buttons">
            <button onclick="filterTasks('all')" class="filter-btn active" id="filter-all">All</button>
            <button onclick="filterTasks('active')" class="filter-btn" id="filter-active">Active</button>
            <button onclick="filterTasks('completed')" class="filter-btn" id="filter-completed">Completed</button>
        </div>

        <div class="tasks-section">
            <ul id="tasksList" class="tasks-list"></ul>
            <div id="emptyState" class="empty-state">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
